name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-extension:
    name: Package Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + typecheck + test
        run: |
          bun run lint
          bun run typecheck
          bun run test

      - name: Determine version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          node -e "const fs=require('node:fs');const p='apps/extension/manifest.json';const m=JSON.parse(fs.readFileSync(p,'utf-8'));m.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n');"

      - name: Build + package
        run: bun --filter='@price-to-impact/extension' run package

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2i-extension-${{ steps.ver.outputs.version }}
          path: apps/extension/releases/*.zip
          if-no-files-found: error

      - name: Attach zip to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/extension/releases/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
